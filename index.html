<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Server Gateway</title>

<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">

<style>

html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:sans-serif;
}

#main{
  height:100%;
  display:flex;
  flex-direction:column;
}

/* ===== Carousel ===== */

#myCarousel {
  height:33vh;
  flex-shrink:0;
  transition:height 0.3s ease;
}

#myCarousel.compact {
  height:8vh;
}

.carousel-inner,
.carousel-item {
  height:100%;
}

.carousel-item {
  position:relative;
}

.carousel-bg {
  position:absolute;
  width:100%;
  height:100%;
  background-size:cover;
  background-position:center;
  filter:blur(6px);
  transform:scale(1.1);
}

.carousel-overlay {
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
}

.carousel-caption {
  z-index:2;
}

/* ===== Scroll Area ===== */

#contentScroll{
  flex:1;
  overflow-y:auto;
}

#contentScroll.hidden {
  display:none;
}

.section{
  height:33vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  padding:40px;
  border-bottom:1px solid #222;
  cursor:pointer;
  transition:background 0.2s;
}

.section:hover{
  background:#111;
}

/* ===== Iframe ===== */

#iframeContainer {
  display:none;
  flex:1;
}

#iframeContainer.active {
  display:block;
}

#iframe {
  width:100%;
  height:100%;
  border:none;
}

/* ===== Back Button ===== */

#backBtn {
  position:absolute;
  top:10px;
  right:10px;
  z-index:999;
  padding:8px 16px;
  font-size:14px;
  border:none;
  border-radius:20px;
  background:rgba(255,255,255,0.15);
  color:#fff;
  backdrop-filter:blur(6px);
  cursor:pointer;
  display:none;
  transition:all 0.2s;
}

#backBtn:hover{
  background:rgba(255,255,255,0.3);
}

#backBtn.show {
  display:block;
}

</style>
</head>

<body>

<button id="backBtn" onclick="goBack()">← Back</button>

<div id="main">

<!-- ===== Carousel ===== -->
<div id="myCarousel" class="carousel slide" data-ride="carousel" data-interval="3000">

  <a class="carousel-control-prev" href="#myCarousel" role="button" data-slide="prev">
    <span class="carousel-control-prev-icon"></span>
  </a>

  <a class="carousel-control-next" href="#myCarousel" role="button" data-slide="next">
    <span class="carousel-control-next-icon"></span>
  </a>

  <div class="carousel-inner">

    <div class="carousel-item active">
      <div class="carousel-bg" style="background-image:url('images/code.png')"></div>
      <div class="carousel-overlay"></div>
      <div class="carousel-caption"><h2>Code Server</h2></div>
    </div>

    <div class="carousel-item">
      <div class="carousel-bg" style="background-image:url('images/vnc.png')"></div>
      <div class="carousel-overlay"></div>
      <div class="carousel-caption"><h2>VNC Server</h2></div>
    </div>

    <div class="carousel-item">
      <div class="carousel-bg" style="background-image:url('images/gitea.png')"></div>
      <div class="carousel-overlay"></div>
      <div class="carousel-caption"><h2>Gitea</h2></div>
    </div>

    <div class="carousel-item">
      <div class="carousel-bg" style="background-image:url('images/ollama.png')"></div>
      <div class="carousel-overlay"></div>
      <div class="carousel-caption"><h2>Ollama</h2></div>
    </div>

    <div class="carousel-item">
      <div class="carousel-bg" style="background-image:url('images/securedrop.png')"></div>
      <div class="carousel-overlay"></div>
      <div class="carousel-caption"><h2>SecureDrop</h2></div>
    </div>

  </div>
</div>

<!-- ===== Scroll Sections ===== -->
<div id="contentScroll">

  <div class="section" onclick="openService('https://code.briarblackrose.online')">
    <h2>Code Server</h2>
    <p>Browser-based development environment.</p>
  </div>

  <div class="section" onclick="openService('https://vnc.briarblackrose.online')">
    <h2>VNC Server</h2>
    <p>Remote desktop access.</p>
  </div>

  <div class="section" onclick="openService('https://gitea-http.briarblackrose.online')">
    <h2>Gitea</h2>
    <p>Self-hosted Git service.</p>
  </div>

  <div class="section" onclick="openService('https://wow.briarblackrose.online')">
    <h2>Ollama</h2>
    <p>Local AI model hosting.</p>
  </div>

  <div class="section" onclick="openService('https://truth.briarblackrose.online')">
    <h2>SecureDrop</h2>
    <p>Anonymous submission system.</p>
  </div>

</div>

<!-- ===== Iframe ===== -->
<div id="iframeContainer">
  <iframe id="iframe"></iframe>
</div>

</div>

<script>

const carousel = document.getElementById("myCarousel")
const content = document.getElementById("contentScroll")
const iframeContainer = document.getElementById("iframeContainer")
const iframe = document.getElementById("iframe")
const backBtn = document.getElementById("backBtn")

function openService(url){
  iframe.src = url

  carousel.classList.add("compact")
  content.classList.add("hidden")
  iframeContainer.classList.add("active")
  backBtn.classList.add("show")
}

function goBack(){
  iframe.src = ""

  carousel.classList.remove("compact")
  content.classList.remove("hidden")
  iframeContainer.classList.remove("active")
  backBtn.classList.remove("show")
}

</script>

<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.12.9/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

</body>
</html>
