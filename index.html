<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Server Gateway</title>

<style>

html, body {
  margin:0;
  padding:0;
  height:100%;
  background:#000;
  color:#fff;
  font-family:sans-serif;
  display:flex;
  flex-direction:column;
}

#taskbar{
  display:none;
  background:#111;
  border-bottom:1px solid #444;
  padding:5px;
  overflow-x:auto;
  white-space:nowrap;
}

#taskbar button{
  font-size:13px;
  padding:6px 10px;
  margin-right:5px;
}

#main{
  flex:1;
  display:flex;
  flex-direction:column;
  align-items:center;
}

button{
  padding:10px 18px;
  margin:6px;
  font-size:15px;
  cursor:pointer;
}

#codeList{
  width:300px;
  max-height:300px;
  overflow-y:auto;
  border:1px solid #444;
  padding:10px;
}

#frame{
  display:none;
  width:100%;
  height:100%;
  border:none;
}

</style>
</head>

<body>

<div id="taskbar"></div>

<div id="main">

<h2>Main Servers</h2>
<div id="primaryServers"></div>

<h2>Code Servers</h2>
<div id="codeList"></div>

<button id="refreshBtn">Refresh</button>

<div id="status">Checking servers...</div>

</div>

<iframe id="frame"></iframe>

<script>

const TIMEOUT = 5000
const CHECK_INTERVAL = 10000
const CODE_COUNT = 20

const primaryServers = [
  {name:"WoW", url:"https://wow.briarblackrose.online"},
  {name:"Truth", url:"https://truth.briarblackrose.online"}
]

const statusEl = document.getElementById("status")
const primaryDiv = document.getElementById("primaryServers")
const codeDiv = document.getElementById("codeList")
const frame = document.getElementById("frame")
const taskbar = document.getElementById("taskbar")
const main = document.getElementById("main")

let allButtons = []

function openServer(url){

  frame.src = url
  frame.style.display = "block"

  main.style.display = "none"
  taskbar.style.display = "block"

  allButtons.forEach(btn=>{
    taskbar.appendChild(btn)
  })

}

function createButton(name,url){

  const btn = document.createElement("button")
  btn.textContent = name

  btn.onclick = ()=>openServer(url)

  allButtons.push(btn)

  return btn
}

function checkServer(url){

  return new Promise(resolve=>{

    const iframe = document.createElement("iframe")
    iframe.style.display="none"
    iframe.src=url+"?check="+Date.now()

    let finished=false

    const timer=setTimeout(()=>{
      if(!finished){
        finished=true
        document.body.removeChild(iframe)
        resolve(false)
      }
    },TIMEOUT)

    iframe.onload=()=>{
      if(!finished){
        finished=true
        clearTimeout(timer)
        document.body.removeChild(iframe)
        resolve(true)
      }
    }

    iframe.onerror=()=>{
      if(!finished){
        finished=true
        clearTimeout(timer)
        document.body.removeChild(iframe)
        resolve(false)
      }
    }

    document.body.appendChild(iframe)

  })

}

async function checkAll(){

  statusEl.textContent="Checking servers..."

  primaryDiv.innerHTML=""
  codeDiv.innerHTML=""
  allButtons=[]

  for(const server of primaryServers){

    const online=await checkServer(server.url)

    if(online){
      primaryDiv.appendChild(createButton(server.name,server.url))
    }

  }
  // check code.briarblackrose.online first
  const baseCodeURL = "https://code.briarblackrose.online"

  const baseOnline = await checkServer(baseCodeURL)

  if(baseOnline){
    codeDiv.appendChild(createButton("Code", baseCodeURL))
  }

  // numbered code servers
  for(let i=1;i<=CODE_COUNT;i++){

    const url = `https://code${i}.briarblackrose.online`

    const online = await checkServer(url)

    if(online){
      codeDiv.appendChild(createButton("Code "+i, url))
    }

  }

  statusEl.textContent="Scan complete"

}

document.getElementById("refreshBtn").onclick=checkAll

setInterval(checkAll,CHECK_INTERVAL)

checkAll()

</script>

</body>
</html>
